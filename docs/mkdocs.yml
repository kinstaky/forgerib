site_name: ForgeRIB
site_url: https://kinstaky.github.io/forgerib
site_author: kinstaky

repo_url: https://github.com/kinstaky/forgerib
repo_name: kinstaky/forgerib

theme:
  name: material
  palette:
    primary: pink
    accent: blue
  language: zh
  features:
    - content.code.copy
    - navigation.expand
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_lang_class: true
      linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - github-callouts

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 简介: index.md
  - 基础:
    - 下载编译: basic/install.md
    - 使用方法: basic/usage.md
    - 数据结构: basic/structure.md
    - 小结: basic/summary.md
  - 进阶:
    - 整体流程: advance/flow.md
    - 解码分类: advance/crush.md
    - 对齐筛选: advance/sift.md
    - 重组熔炼: advance/smelt.md